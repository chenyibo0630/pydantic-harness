llm:
  # type: openai | azure | deepseek | qwen
  type: azure
  model: gpt-5-chat
  api_key: your-api-key-here
  # Azure specific
  azure_endpoint: https://your-resource.openai.azure.com/
  azure_api_version: "2024-12-01-preview"
  # Common
  temperature: 0
  max_tokens: 4096
  # thinking: high  # enable reasoning (high/medium/low/minimal)

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"
  stream_timeout: 120.0
  log_level: INFO

agent:
  system_prompt_file: prompts/SYSTEM.md
  workspace: /path/to/your/workspace
