llm:
  # type: openai | azure | deepseek | qwen | anthropic
  type: azure
  model: gpt-5-chat
  api_key: your-api-key-here
  # Azure specific
  azure_endpoint: https://your-resource.openai.azure.com/
  azure_api_version: "2024-12-01-preview"
  # Common
  temperature: 0
  max_tokens: 4096
  # thinking: high  # enable reasoning (high/medium/low/minimal)

# ── Anthropic (Claude) example ─────────────────────────────────
# llm:
#   type: anthropic
#   model: claude-sonnet-4-6        # or claude-opus-4-7 / claude-haiku-4-5-20251001
#   api_key: sk-ant-...
#   temperature: 0
#   max_tokens: 4096

server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"
  stream_timeout: 60.0  # idle timeout: max seconds between SSE events (not total stream time)
  log_level: INFO

agent:
  system_prompt_file: prompts/SYSTEM.md
  workspace: /path/to/your/workspace
  skills:
    - tavily

sandbox:
  # type: local (in-process, dev) | remote (call sandbox container via HTTP)
  type: local
  remote_url: http://sandbox:8100   # used when type=remote
  timeout: 60
  # Auth — backend sends `Authorization: Bearer <token>`, sandbox validates.
  # Either set `token` to a long random secret (e.g. `openssl rand -hex 32`)
  # OR set `allow_no_auth: true` to explicitly opt out for local dev.
  # Sandbox refuses to start if NEITHER is set.
  token: ""
  allow_no_auth: true   # change to false + set token for production

# Skill API keys are provided via environment variables (not in this file).
# Each skill's SKILL.md declares required_env in frontmatter.
# Example: set TAVILY_API_KEY in .env or system environment to enable the tavily skill.
