name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    name: scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history; gitleaks scans every commit, not just the diff

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required when scanning private orgs.
          # Personal repos work without it.
