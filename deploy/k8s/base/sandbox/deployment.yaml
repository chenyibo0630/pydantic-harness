apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  namespace: pydantic-harness
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/part-of: pydantic-harness
spec:
  replicas: 1
  # Recreate strategy: PVC is RWO, so the new Pod cannot mount it while the
  # old Pod still holds it. Recreate ensures clean handoff. Brief downtime
  # during upgrade is acceptable for self-use.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox
        app.kubernetes.io/part-of: pydantic-harness
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sandbox
          image: pydantic-harness/sandbox:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
              name: http
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: PYTHONPATH
              value: /app
            - name: SANDBOX_WORKSPACE
              value: /app/workspace
            - name: SANDBOX_SKILLS_DIR
              value: /app/skills
            - name: SANDBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SANDBOX_TOKEN
                  optional: true
            - name: SANDBOX_ALLOW_NO_AUTH
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
