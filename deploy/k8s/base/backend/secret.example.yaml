# TEMPLATE ONLY — do not apply this file directly, and do not commit real values.
# This file is intentionally excluded from kustomization.yaml so it is never
# rendered into the cluster.
#
# Create the real Secret with kubectl:
#
#   kubectl -n pydantic-harness create secret generic backend-secrets \
#     --from-literal=SANDBOX_TOKEN="$(openssl rand -hex 32)" \
#     --from-literal=DEEPSEEK_API_KEY="..." \
#     --from-literal=OPENAI_API_KEY="..." \
#     --from-literal=ANTHROPIC_API_KEY="..."
#
# Or patch an existing secret without overwriting other keys:
#
#   kubectl -n pydantic-harness patch secret backend-secrets \
#     --type=merge \
#     -p='{"stringData":{"OPENAI_API_KEY":"new-value"}}'
#
# After updating the Secret, restart the backend so it picks up the new env:
#
#   kubectl -n pydantic-harness rollout restart deploy/backend
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: pydantic-harness
type: Opaque
stringData:
  SANDBOX_TOKEN: "REPLACE_ME"
  DEEPSEEK_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
