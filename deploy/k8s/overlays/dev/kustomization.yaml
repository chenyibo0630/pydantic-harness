apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

commonAnnotations:
  pydantic-harness/env: dev

# Dev tags rebuilt frequently. Update via:
#   kustomize edit set image pydantic-harness/backend=pydantic-harness/backend:<new-tag>
images:
  - name: pydantic-harness/sandbox
    newTag: dev
  - name: pydantic-harness/backend
    newTag: dev
  - name: pydantic-harness/frontend
    newTag: dev
